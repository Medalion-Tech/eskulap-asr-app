name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable whisper.cpp's aggressive ARM ISA auto-detection which breaks
          # on some macOS arm64 GitHub runners (i8mm mismatch).
          CMAKE_ARGS: ${{ startsWith(matrix.platform, 'macos') && '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.4-a' || '' }}
        with:
          tagName: ${{ steps.tag.outputs.TAG }}
          releaseName: 'Eskulap ASR ${{ steps.tag.outputs.TAG }}'
          releaseBody: |
            ## Instalacja

            **macOS (Apple Silicon)** — `Eskulap.ASR_0.1.0_aarch64.dmg`
            **macOS (Intel)** — `Eskulap.ASR_0.1.0_x64.dmg`
            **Windows** — `Eskulap.ASR_0.1.0_x64-setup.exe` (NSIS)
            **Linux (Omarchy / Arch / Ubuntu)** — `.AppImage` (`chmod +x`, uruchom)

            ### macOS — ważne

            Aplikacja jest **ad-hoc signed** (bez certyfikatu Apple Developer).

            Jeśli przy otwieraniu pojawi się "Eskulap ASR jest uszkodzona" —
            otwórz Terminal i wykonaj:

            ```bash
            xattr -cr "/Applications/Eskulap ASR.app"
            ```

            Potem prawym przyciskiem → **Otwórz**.

            ### Windows

            SmartScreen: "Więcej informacji" → "Uruchom mimo to".

            ---

            Przy pierwszym uruchomieniu aplikacja pobiera model ASR (~800 MB).

            ## Model

            [`lion-ai/eskulap-asr-turbo-beta`](https://huggingface.co/lion-ai/eskulap-asr-turbo-beta) — fine-tuned whisper-large-v3-turbo dla polskiej mowy medycznej (Q8_0 quantization).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.label }}
          path: |
            src-tauri/target/**/*.log
          retention-days: 7
