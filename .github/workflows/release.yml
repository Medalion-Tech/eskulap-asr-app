name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            features: accel-metal
            args: '--target aarch64-apple-darwin --features accel-metal'
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            features: accel-metal
            args: '--target x86_64-apple-darwin --features accel-metal'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64-vulkan
            features: accel-vulkan
            args: '--features accel-vulkan'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64-cpu
            features: accel-cpu
            args: '--features accel-cpu -c src-tauri/tauri.linux-cpu.conf.json'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-cpu
            features: accel-cpu
            args: '--features accel-cpu'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-cuda
            features: accel-cuda
            args: '--features accel-cuda -c src-tauri/tauri.windows-cuda.conf.json'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install Linux base dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install Vulkan SDK (Linux Vulkan only)
        if: matrix.label == 'linux-x64-vulkan'
        run: |
          # LunarG Vulkan SDK — provides glslc (shaderc) which Ubuntu apt lacks
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/lunarg.gpg
          echo "deb [signed-by=/usr/share/keyrings/lunarg.gpg] https://packages.lunarg.com/vulkan/1.3.290 jammy main" | \
            sudo tee /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install CUDA Toolkit (Windows CUDA only)
        if: matrix.label == 'windows-x64-cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "curand", "curand_dev", "cuda_profiler_api", "visual_studio_integration"]'

      - name: Stage CUDA redistributables (Windows CUDA only)
        if: matrix.label == 'windows-x64-cuda'
        shell: pwsh
        run: |
          $cudaBin = "$env:CUDA_PATH\bin"
          $dest    = "src-tauri\resources\cuda"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item "$cudaBin\cublas64_12.dll"    $dest
          Copy-Item "$cudaBin\cublasLt64_12.dll"  $dest
          Copy-Item "$cudaBin\cudart64_12.dll"    $dest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Configure whisper.cpp build (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: echo "CMAKE_ARGS=-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.4-a" >> $GITHUB_ENV

      - name: Configure whisper.cpp build (Windows CUDA)
        if: matrix.label == 'windows-x64-cuda'
        shell: bash
        run: |
          # Ensure CUDA architectures are set (support common GeForce cards)
          echo "CMAKE_CUDA_ARCHITECTURES=75;80;86;89;90" >> $GITHUB_ENV

      - name: Fetch Rust dependencies (for patch step)
        shell: bash
        working-directory: src-tauri
        run: cargo fetch

      - name: Patch llama.cpp (Gemma 4 E4B FGDN_AR workaround)
        shell: bash
        run: bash scripts/patch-llama-cpp.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.TAG }}
          releaseName: 'Eskulap ASR ${{ steps.tag.outputs.TAG }}'
          releaseBody: |
            ## Instalacja

            ### Windows

            - **Eskulap ASR (CPU)** — `Eskulap.ASR_<ver>_x64-setup.exe` (zalecany dla większości)
              Działa na każdym komputerze, nie wymaga GPU ani CUDA.
            - **Eskulap ASR CUDA** — `Eskulap.ASR..CUDA.._<ver>_x64-setup.exe`
              Szybsze streszczenia AI na kartach NVIDIA (GTX 10xx i nowsze).
              Wymaga aktualnego sterownika NVIDIA. CUDA Runtime jest w instalatorze — nie musisz go instalować osobno.

            SmartScreen: "Więcej informacji" → "Uruchom mimo to".

            ### Linux

            - **Eskulap ASR (Vulkan)** — `.AppImage` (zalecany)
              Wymaga sterownika Vulkan (Mesa / NVIDIA / AMD).
              `sudo pacman -S vulkan-intel` / `vulkan-radeon` / `nvidia-utils` na Arch.
            - **Eskulap ASR (CPU)** — fallback dla headless / VM / minimalnych środowisk.

            `chmod +x` na pliku AppImage przed uruchomieniem.

            ### macOS

            - **Apple Silicon** — `Eskulap.ASR_<ver>_aarch64.dmg`
            - **Intel** — `Eskulap.ASR_<ver>_x64.dmg`

            Aplikacja jest **ad-hoc signed** (bez certyfikatu Apple Developer).
            Jeśli pojawi się "Eskulap ASR jest uszkodzona" — otwórz Terminal:

            ```bash
            xattr -cr "/Applications/Eskulap ASR.app"
            ```

            Potem prawym przyciskiem → **Otwórz**.

            ---

            Przy pierwszym uruchomieniu aplikacja pobiera model ASR (~800 MB).
            AI streszczenia notatek (model ~5 GB) są opcjonalne — można je włączyć/wyłączyć w Ustawieniach.

            ## Model

            [`lion-ai/eskulap-asr-turbo-beta`](https://huggingface.co/lion-ai/eskulap-asr-turbo-beta) — fine-tuned whisper-large-v3-turbo dla polskiej mowy medycznej (Q8_0 quantization).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.label }}
          path: |
            src-tauri/target/**/*.log
          retention-days: 7
