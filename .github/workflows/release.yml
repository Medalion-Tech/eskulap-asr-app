name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            features: accel-metal
            args: '--target aarch64-apple-darwin --features accel-metal'
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            features: accel-metal
            args: '--target x86_64-apple-darwin --features accel-metal'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64-vulkan
            features: accel-vulkan
            args: '--features accel-vulkan'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64-cpu
            features: accel-cpu
            args: '--features accel-cpu -c src-tauri/tauri.linux-cpu.conf.json'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-cpu
            features: accel-cpu
            args: '--features accel-cpu'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-cuda
            features: accel-cuda
            args: '--features accel-cuda -c src-tauri/tauri.windows-cuda.conf.json'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-vulkan
            features: accel-vulkan
            args: '--features accel-vulkan -c src-tauri/tauri.windows-vulkan.conf.json'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install Linux base dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - name: Install Vulkan SDK (Linux Vulkan only)
        if: matrix.label == 'linux-x64-vulkan'
        run: |
          # LunarG Vulkan SDK — provides glslc (shaderc) which Ubuntu apt lacks
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/lunarg.gpg
          echo "deb [signed-by=/usr/share/keyrings/lunarg.gpg] https://packages.lunarg.com/vulkan/1.3.290 jammy main" | \
            sudo tee /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install CUDA Toolkit (Windows CUDA only)
        if: matrix.label == 'windows-x64-cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "curand", "curand_dev", "cuda_profiler_api", "visual_studio_integration"]'

      - name: Stage CUDA redistributables (Windows CUDA only)
        if: matrix.label == 'windows-x64-cuda'
        shell: pwsh
        run: |
          $cudaBin = "$env:CUDA_PATH\bin"
          $dest    = "src-tauri\resources\cuda"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item "$cudaBin\cublas64_12.dll"    $dest
          Copy-Item "$cudaBin\cublasLt64_12.dll"  $dest
          Copy-Item "$cudaBin\cudart64_12.dll"    $dest

      - name: Install Vulkan SDK (Windows Vulkan only)
        if: matrix.label == 'windows-x64-vulkan'
        shell: pwsh
        run: |
          # LunarG Vulkan SDK — required at BUILD time for glslc (shaderc) which
          # compiles the ggml Vulkan compute shaders into the binary. At RUNTIME
          # the app only needs vulkan-1.dll, which ships with Windows 10 1809+
          # and/or the user's GPU driver (Intel / AMD / NVIDIA), so no DLLs need
          # to be bundled into the installer (unlike CUDA).
          $ver = "1.3.290.0"
          $installer = "$env:RUNNER_TEMP\VulkanSDK-Installer.exe"
          curl.exe -o $installer -L "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          & $installer --root "C:\VulkanSDK\$ver" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\$ver"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\$ver\Bin"

      # Why this is needed:
      # ggml-vulkan's CMakeLists.txt uses ExternalProject_Add to build
      # vulkan-shaders-gen (a host tool). When MSBuild runs the Custom Build rule
      # that spawns the child cmake, cl.exe is invoked WITHOUT vcvars env vars
      # (INCLUDE/LIB/LIBPATH/VSINSTALLDIR). This causes two symptoms in the child:
      #   1) "The C compiler identification is unknown" (cl.exe aborts before
      #      CMake can identify it).
      #   2) "error C1083: Cannot open compiler generated file: '': Invalid
      #      argument" — the signature of cl.exe without vcvars; it tries to
      #      construct intermediate file names from empty env vars and fails.
      # ilammy/msvc-dev-cmd runs vcvarsall.bat and exports the MSVC env vars
      # into $GITHUB_ENV, so every subsequent step (including MSBuild's Custom
      # Build → child cmake → MSBuild → cl.exe) inherits a functional MSVC env.
      # NOTE: this must be paired with the CLANG_PATH / LIBCLANG_PATH overrides
      # below, because vcvars prepends VS's bundled Clang 19 (which ships with
      # a BROKEN mmintrin.h) to PATH, which would break whisper-rs-sys bindgen.
      - name: Setup MSVC dev environment (Windows Vulkan)
        if: matrix.label == 'windows-x64-vulkan'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Override bindgen's Clang search to use the runner's system LLVM
      # (C:\Program Files\LLVM), NOT VS's bundled Clang at
      # C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm.
      # VS-bundled Clang 19's mmintrin.h is missing __builtin_ia32_paddsb and
      # other MMX builtins — parsing whisper.cpp headers via bindgen produces
      # "use of undeclared identifier '__builtin_ia32_paddsb'" errors.
      #
      # Two env vars matter for clang-sys / bindgen:
      #   - LIBCLANG_PATH: which libclang.dll is loaded (controls parsing).
      #   - CLANG_PATH:    which clang.exe is used to scrape system include
      #                    paths via `clang -E -x c -v`. Without this,
      #                    clang-sys's Clang::find() walks PATH and picks up
      #                    VS Llvm's clang.exe (which msvc-dev-cmd above put on
      #                    PATH), then injects VS Llvm's broken mmintrin.h via
      #                    -isystem flags.
      # Setting CLANG_PATH short-circuits PATH scanning entirely.
      - name: Force bindgen to use system LLVM (Windows Vulkan)
        if: matrix.label == 'windows-x64-vulkan'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM"
          if (-not (Test-Path "$llvm\bin\clang.exe")) {
            Write-Error "System LLVM not found at $llvm; runner image changed?"
            exit 1
          }
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvm\bin"
          Add-Content $env:GITHUB_ENV "CLANG_PATH=$llvm\bin\clang.exe"
          # Prepend to PATH so any child process that re-probes for clang.exe
          # also finds system LLVM before VS Llvm.
          Add-Content $env:GITHUB_PATH "$llvm\bin"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Configure whisper.cpp build (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: echo "CMAKE_ARGS=-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.4-a" >> $GITHUB_ENV

      - name: Configure whisper.cpp build (Windows CPU)
        if: matrix.label == 'windows-x64-cpu'
        shell: bash
        run: |
          # AVX2+FMA+F16C: baseline for every x86-64 CPU since 2013 (Haswell / Piledriver).
          # GGML_NATIVE=ON on a GH runner may embed AVX-512 → SIGILL on user machines.
          # GGML_OPENMP=OFF: MSVC OpenMP pulls vcomp140.dll from VC++ Redistributable,
          # which many target machines lack → silent abort (0xC0000135) on first
          # parallel region. whisper.cpp's internal thread pool is used instead.
          echo "CMAKE_ARGS=-DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_OPENMP=OFF" >> $GITHUB_ENV

      - name: Configure whisper.cpp build (Windows CUDA)
        if: matrix.label == 'windows-x64-cuda'
        shell: bash
        run: |
          # Ensure CUDA architectures are set (support common GeForce cards)
          echo "CMAKE_CUDA_ARCHITECTURES=75;80;86;89;90" >> $GITHUB_ENV

      - name: Configure whisper.cpp build (Windows Vulkan)
        if: matrix.label == 'windows-x64-vulkan'
        shell: bash
        run: |
          # GGML_VULKAN=ON: compile shaders with glslc from the LunarG SDK.
          # CPU baseline flags mirror windows-x64-cpu (portable, no AVX-512).
          # OPENMP=OFF for the same reason as windows-x64-cpu (vcomp140.dll dep).
          echo "CMAKE_ARGS=-DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_OPENMP=OFF -DGGML_VULKAN=ON" >> $GITHUB_ENV

      - name: Fetch Rust dependencies (for patch step)
        shell: bash
        working-directory: src-tauri
        run: cargo fetch

      - name: Patch llama.cpp (Gemma 4 E4B FGDN_AR workaround)
        shell: bash
        run: bash scripts/patch-llama-cpp.sh

      - name: Patch ggml-vulkan ExternalProject (forward compiler to sub-cmake)
        if: contains(matrix.features, 'accel-vulkan')
        shell: bash
        run: bash scripts/patch-vulkan-shaders.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.TAG }}
          releaseName: 'Eskulap ASR ${{ steps.tag.outputs.TAG }}'
          releaseBody: |
            ## Instalacja

            ### Windows

            - **Eskulap ASR (CPU)** — `Eskulap.ASR_<ver>_x64-setup.exe` (fallback uniwersalny)
              Działa na każdym komputerze, nie wymaga GPU. Najwolniejszy wariant.
            - **Eskulap ASR (Vulkan)** — `Eskulap.ASR..Vulkan.._<ver>_x64-setup.exe` (**zalecany dla większości**)
              Akceleracja GPU działa na NVIDIA (GTX 9xx+), AMD Radeon (RX 5xx+), Intel Arc/Iris Xe.
              Wymaga tylko aktualnego sterownika GPU (vulkan-1.dll jest w Windows 10 1809+).
            - **Eskulap ASR CUDA** — `Eskulap.ASR..CUDA.._<ver>_x64-setup.exe`
              Najszybszy wariant dla nowszych NVIDIA (GTX 10xx i nowsze).
              Wymaga aktualnego sterownika NVIDIA. CUDA Runtime jest w instalatorze — nie musisz go instalować osobno.

            SmartScreen: "Więcej informacji" → "Uruchom mimo to".

            ### Linux

            - **Eskulap ASR (Vulkan)** — `.AppImage` (zalecany)
              Wymaga sterownika Vulkan (Mesa / NVIDIA / AMD).
              `sudo pacman -S vulkan-intel` / `vulkan-radeon` / `nvidia-utils` na Arch.
            - **Eskulap ASR (CPU)** — fallback dla headless / VM / minimalnych środowisk.

            `chmod +x` na pliku AppImage przed uruchomieniem.

            ### macOS

            - **Apple Silicon** — `Eskulap.ASR_<ver>_aarch64.dmg`
            - **Intel** — `Eskulap.ASR_<ver>_x64.dmg`

            Aplikacja jest **ad-hoc signed** (bez certyfikatu Apple Developer).
            Jeśli pojawi się "Eskulap ASR jest uszkodzona" — otwórz Terminal:

            ```bash
            xattr -cr "/Applications/Eskulap ASR.app"
            ```

            Potem prawym przyciskiem → **Otwórz**.

            ---

            Przy pierwszym uruchomieniu aplikacja pobiera model ASR (~800 MB).
            AI streszczenia notatek (model ~5 GB) są opcjonalne — można je włączyć/wyłączyć w Ustawieniach.

            ## Model

            [`lion-ai/eskulap-asr-turbo-beta`](https://huggingface.co/lion-ai/eskulap-asr-turbo-beta) — fine-tuned whisper-large-v3-turbo dla polskiej mowy medycznej (Q8_0 quantization).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.label }}
          path: |
            src-tauri/target/**/*.log
          retention-days: 7
